spring.application.name=defesa-api
server.port=${SERVER_PORT:8080}

# --- Banco de dados (schema e seed vem de db/init.sql, sem DDL automatico) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:labdefesa}
spring.datasource.username=${DB_USER:labdefesa}
spring.datasource.password=${DB_PASSWORD:labdefesa}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Rate limiting (pode ser ligado/desligado em runtime via /admin/defense) ---
defesa.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
defesa.rate-limit.max-attempts=${RATE_LIMIT_MAX_ATTEMPTS:5}
defesa.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
